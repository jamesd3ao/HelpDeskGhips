
{% extends 'base.html' %}
{% block title %}Cambiar contraseña{% endblock %}
{% block content %}
<h2>Cambiar contraseña de {{ u['username'] }}</h2>
<form method="post"><div><label>Nueva contraseña</label><input type="password" name="password" required></div>
<p style="margin-top:12px"><button class="btn primary">Actualizar</button> <a class="btn" href="{{ url_for('users.usuarios') }}">Volver</a></p></form>
{% endblock %}
